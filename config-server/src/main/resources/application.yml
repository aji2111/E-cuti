server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/aji2111/E-cuti.git
          default-label: main
          search-paths: configs
          clone-on-start: true

# Tambahkan bagian Eureka agar service lain bisa menemukan config-server
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh